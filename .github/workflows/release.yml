name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.96.0'
      
      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libtesseract-dev libleptonica-dev \
            xorg-dev libxcb-composite0-dev libxcb-cursor-dev \
            libxcb-randr0-dev libxcb-xtest0-dev libxcb-render0-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev \
            libxi-dev libxtst-dev \
            libdbus-1-dev pkg-config \
            libfontconfig1-dev \
            libssl-dev
      
      - name: Build orbiter
        run: cargo build --release --bin orbiter
      
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: orbiter-linux
          path: target/release/orbiter

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.96.0'
      
      - name: Restore vcpkg binary cache
        # vcpkg removed its 'x-gha' GitHub Actions Cache binary source
        # (github.com/microsoft/vcpkg-tool/pull/1662) - it silently kept
        # working (just a warning, not an error) but stopped caching
        # anything at all, so every release was doing a full from-scratch
        # Tesseract/Leptonica compile (~20+ min, confirmed live via the
        # workflow's own step timing: 1392s on "Install Tesseract via
        # vcpkg" alone). Switched to vcpkg's plain filesystem binary cache
        # (VCPKG_BINARY_SOURCES=files,<path>,readwrite below) persisted
        # across runs with actions/cache instead - no new secrets/tokens
        # needed, unlike the officially-recommended NuGet/GitHub Packages
        # replacement. Bump the key suffix if the installed package set
        # ever changes, to avoid serving a stale cache.
        uses: actions/cache@v4
        with:
          path: C:\vcpkg-binary-cache
          key: vcpkg-binary-cache-windows-tesseract-v1

      - name: Install Tesseract via vcpkg
        env:
          VCPKG_BINARY_SOURCES: "clear;files,C:\\vcpkg-binary-cache,readwrite"
        run: |
          vcpkg install tesseract:x64-windows
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV
          echo "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin" >> $env:GITHUB_PATH

      - name: Build orbiter
        env:
          VCPKGRS_TRIPLET: x64-windows
          VCPKGRS_DYNAMIC: 1
        run: cargo build --release --bin orbiter

      - name: Bundle Tesseract/Leptonica DLLs
        run: |
          # VCPKGRS_DYNAMIC=1 links orbiter.exe against tesseractXX.dll etc
          # rather than baking them in — the vcpkg bin dir being on PATH
          # only helps this CI job itself, not anyone who later downloads
          # the exe. Ship the DLLs alongside it so it actually runs.
          Copy-Item "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin\*.dll" target/release/

          # Tesseract/Leptonica are C++ libraries vcpkg built against the
          # dynamic MSVC runtime, so they need msvcp140.dll/vcruntime140*.dll
          # too — present on this CI runner (VS Build Tools install them
          # system-wide) but not on a bare end-user Windows machine.
          Copy-Item "C:\Windows\System32\msvcp140.dll" target/release/
          Copy-Item "C:\Windows\System32\vcruntime140.dll" target/release/
          Copy-Item "C:\Windows\System32\vcruntime140_1.dll" target/release/

          Compress-Archive -Path target/release/orbiter.exe, target/release/*.dll -DestinationPath target/release/orbiter-windows-x86_64.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: orbiter-windows
          path: target/release/orbiter-windows-x86_64.zip

  create-release:
    needs: [build-linux, build-windows]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Default shallow fetch doesn't reliably include full annotated
          # tag objects - without this, `git tag -l --format='%(contents)'`
          # can silently fall back to the pointed-at commit's message
          # instead of the tag's own annotation message.
          fetch-depth: 0
          fetch-tags: true

      - name: Force-fetch the triggering tag's real annotated object
        # actions/checkout's initial fetch for a tag-triggered run grabs the
        # tag as a lightweight ref pointing at the commit SHA. The later
        # fetch-tags pass above doesn't overwrite that already-existing
        # local ref, so `git tag -l --format='%(contents)'` below still saw
        # the commit message instead of the tag's own annotation even with
        # fetch-depth/fetch-tags set (confirmed live on v1.2.7's release).
        # Force-fetching this exact tag ref replaces it with the real
        # annotated tag object.
        run: git fetch --force origin "refs/tags/${{ github.ref_name }}:refs/tags/${{ github.ref_name }}"

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: orbiter-linux
          path: linux-binary
      
      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: orbiter-windows
          path: windows-binary
      
      - name: Move binaries to release directory
        run: |
          mkdir -p release/binaries
          mv linux-binary/orbiter release/binaries/orbiter-linux-x86_64
          mv windows-binary/orbiter-windows-x86_64.zip release/binaries/
      
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the tag name from the current commit
          TAG="${{ github.ref_name }}"

          # Build release notes from the annotated tag message (what
          # "git tag -a -m '...'" actually contains) instead of the old
          # static .github/release-notes.md, which never changed between
          # releases and just said "See GitHub releases for detailed
          # changelog" - a placeholder pointing at itself. Falls back to
          # a generic line if the tag has no annotation message.
          TAG_BODY="$(git tag -l --format='%(contents)' "$TAG")"
          if [ -z "$TAG_BODY" ]; then
            TAG_BODY="Kieda's Orbiter $TAG"
          fi
          {
            echo "$TAG_BODY"
            echo
            cat .github/release-notes.md
          } > /tmp/release_notes.md

          # Create release if it doesn't already exist (e.g. tag was pushed manually first)
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release already exists, uploading assets..."
          else
            gh release create "$TAG" \
              --title "Kieda's Orbiter $TAG" \
              --notes-file /tmp/release_notes.md \
              --verify-tag
          fi

          # Upload the binaries as release assets
          gh release upload "$TAG" \
            "release/binaries/orbiter-linux-x86_64" \
            "release/binaries/orbiter-windows-x86_64.zip" \
            --clobber
