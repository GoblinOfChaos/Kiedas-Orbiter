name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.96.0'
      
      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libtesseract-dev libleptonica-dev \
            xorg-dev libxcb-composite0-dev libxcb-cursor-dev \
            libxcb-randr0-dev libxcb-xtest0-dev libxcb-render0-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev \
            libxi-dev libxtst-dev \
            libdbus-1-dev pkg-config \
            libfontconfig1-dev \
            libssl-dev
      
      - name: Build orbiter
        run: cargo build --release --bin orbiter
      
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: orbiter-linux
          path: target/release/orbiter

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.96.0'
      
      - name: Install Tesseract via vcpkg
        run: |
          vcpkg install tesseract:x64-windows
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV
          echo "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin" >> $env:GITHUB_PATH

      - name: Build orbiter
        env:
          VCPKGRS_TRIPLET: x64-windows
        run: cargo build --release --bin orbiter
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: orbiter-windows
          path: target/release/orbiter.exe

  create-release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: orbiter-linux
          path: linux-binary
      
      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: orbiter-windows
          path: windows-binary
      
      - name: Move binaries to release directory
        run: |
          mkdir -p release/binaries
          mv linux-binary/orbiter release/binaries/
          mv windows-binary/orbiter.exe release/binaries/orbiter-win64.exe
      
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the tag name from the current commit
          TAG="${{ github.ref_name }}"
          
          # Create release (may already exist if tag was pushed manually)
          gh release create "$TAG" \
            --title "Kieda's Orbiter $TAG" \
            --notes-file .github/release-notes.md \
            --verify-tag \
            2>/dev/null || echo "Release may already exist, uploading assets..."

          # Upload the binaries as release assets
          gh release upload "$TAG" \
            "release/binaries/orbiter" \
            "release/binaries/orbiter-win64.exe" \
            --clobber
